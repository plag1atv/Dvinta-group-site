<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or "Двинта" }}</title>

    <!-- Yandex.Metrika counter -->

          m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
          m[i].l=1*new Date();

              if (document.scripts[j].src === r) {
                  return;
              }
          }
          k=e.createElement(t),
          a=e.getElementsByTagName(t)[0],
          k.async=1,
          k.src=r,
          a.parentNode.insertBefore(k,a);
      })(window, document, 'script', 'https://mc.yandex.ru/metrika/tag.js?id=109859267', 'ym');

      ym(109859267, 'init', {
          ssr: true,

  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/dvinta_mark_256.png') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/dvinta_mark_256.png') }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/equipment.css') }}">


  <!--
  <script type="text/javascript">
    window._ab_id_ = 173069;
  </script>
  <script src="https://cdn.botfaqtor.ru/one.js"></script>
  -->

</head>
<body class="min-h-screen flex flex-col bg-soft has-modern-bg" data-equipment="{{ equipment_type }}">

  <noscript>
      <div>
          <img src="https://mc.yandex.ru/watch/109859267"
               style="position:absolute; left:-9999px;"
               alt="" />
      </div>
  </noscript>

  <!-- Процедурная 3D-гора -->
  <div id="mountain-scene" aria-hidden="true">
    <canvas id="mountain-canvas"></canvas>
  </div>

  {% include "partials/header.html" %}
  <main class="flex-1">
    {% block content %}{% endblock %}
  </main>
    {% include "partials/footer.html" %}

  {% if request.endpoint != "contacts" %}
    <div class="floating-request" id="floatingRequest">
      <div class="floating-request__bubble" id="floatingRequestBubble">
        <button
          class="floating-request__close"
          id="floatingRequestClose"
          type="button"
          aria-label="Закрыть подсказку"
        >
          ×
        </button>
        <span>Оставить заявку</span>
      </div>

      <a
        class="floating-request__button"
        href="{{ url_for('contacts') }}"
        aria-label="Перейти на страницу контактов"
      >
        <i data-lucide="message-circle-heart"></i>
      </a>
    </div>
  {% endif %}

  <!-- Lucide icons (for <i data-lucide="..."></i>) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="{{ url_for('static', filename='js/mountain.js') }}"></script>
  <script src="{{ url_for('static', filename='js/site.js') }}"></script>
  <script>
    if (window.lucide) { lucide.createIcons(); }
  </script>
  <script src="{{ url_for('static', filename='js/reveal.js') }}"></script>
</body>
</html>
